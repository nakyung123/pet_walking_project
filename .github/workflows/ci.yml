name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 브랜치에 새 커밋 push 시 이전 실행 자동 취소 (CI 리소스 낭비 방지)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 최소 권한 원칙: 읽기 전용으로 고정
permissions:
  contents: read

jobs:
  backend:
    name: Backend — lint / type / test / audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 의존성 설치
        working-directory: backend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: backend
        run: npm run lint

      - name: 타입 체크 (tsc)
        working-directory: backend
        run: npx tsc --noEmit

      - name: 테스트 + 커버리지
        working-directory: backend
        run: npm test -- --coverage --coverageReporters=text-summary
        env:
          NODE_ENV: test

      - name: 보안 감사 (npm audit)
        working-directory: backend
        run: npm audit --audit-level=high

  frontend:
    name: Frontend — type / build / audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: 의존성 설치
        working-directory: frontend-web
        run: npm ci

      - name: Next.js 프로덕션 빌드 (타입 체크 포함)
        working-directory: frontend-web
        run: npm run build
        env:
          # 빌드 타임에 필요한 공개 환경변수 — GitHub Secrets에 등록 필요
          NEXT_PUBLIC_NAVER_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_ID }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: 보안 감사 (npm audit)
        working-directory: frontend-web
        run: npm audit --audit-level=high
