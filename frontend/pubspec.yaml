name: pet_territory
description: "반려견 영역 점유 산책 게임 앱 — 펫 테리토리"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 네이버 지도
  flutter_naver_map: ^1.3.1

  # 환경변수 (.env 파일)
  flutter_dotenv: ^5.2.1

  # HTTP 통신 (백엔드 API)
  dio: ^5.7.0

  # 위치 정보 (GPS)
  geolocator: ^13.0.2

  # 상태 관리
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # .env 파일을 앱 에셋으로 등록
  assets:
    - .env
